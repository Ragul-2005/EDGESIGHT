<!DOCTYPE html>
<html>
<head>
<title>EDGE SIGHT-OBJECT DETECTION</title>
<meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",sans-serif;}

body{
    height:100vh;
    overflow:hidden;
    background:
        radial-gradient(circle at top left,#1d4ed8 0,transparent 45%),
        radial-gradient(circle at bottom right,#a855f7 0,transparent 45%),
        #020617;
    color:#e5e7eb;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image:
        linear-gradient(#11182733 1px,transparent 1px),
        linear-gradient(90deg,#11182733 1px,transparent 1px);
    background-size:40px 40px;
    opacity:0.4;
}

.wrapper{
    width:90%;
    max-width:1200px;
    margin:24px auto;
    position:relative;
    z-index:1;
}

.header{text-align:center;margin-bottom:16px;}
.header-title{font-size:32px;font-weight:700;letter-spacing:0.08em;color:#e5e7eb;}
.header-sub{font-size:14px;color:#9ca3af;}

.card{
    display:flex;
    gap:20px;
    padding:22px;
    border-radius:20px;
    background:rgba(15,23,42,0.9);
    border:1px solid #1f2937;
    box-shadow:0 18px 45px rgba(0,0,0,0.7);
}

.panel{
    flex:1;
    padding:16px;
    border-radius:16px;
    background:radial-gradient(circle at top left,#1f2937,#020617);
    border:1px solid #0ea5e977;
    box-shadow:
        0 0 0 1px rgba(15,23,42,0.9),
        0 0 25px rgba(8,47,73,0.8);
    position:relative;
}

.panel h2{
    color:#a5b4fc;
    margin-bottom:12px;
    font-size:16px;
    letter-spacing:0.16em;
}

#imgbox{
    width:100%;
    border-radius:12px;
    border:1px solid #0ea5e9;
    box-shadow:0 0 30px #0ea5e955;
}

.scan-line{
    position:absolute;
    left:10px;right:10px;
    top:0;
    height:2px;
    background:linear-gradient(90deg,transparent,#22d3ee,transparent);
    opacity:0.7;
    animation:scan 2.3s linear infinite;
}

@keyframes scan{
    0%{top:14%;opacity:0.2;}
    50%{top:70%;opacity:0.9;}
    100%{top:14%;opacity:0.2;}
}

textarea{
    width:100%;
    height:340px;
    border-radius:12px;
    background:#020617;
    border:1px solid #4c1d95;
    color:#e5e7eb;
    padding:12px;
    font-size:16px;
    resize:none;
    outline:none;
    box-shadow:0 0 18px #4c1d9577 inset;
}

.status-tag{
    position:absolute;
    top:16px;
    right:16px;
    font-size:11px;
    background:rgba(15,23,42,0.9);
    border-radius:999px;
    padding:4px 10px;
    border:1px solid #22c55e;
    color:#bbf7d0;
    display:flex;
    align-items:center;
    gap:6px;
}

.status-dot{
    width:8px;
    height:8px;
    border-radius:999px;
    background:#22c55e;
    box-shadow:0 0 8px #22c55e;
}

@media(max-width:900px){
    .card{flex-direction:column;}
}
</style>
</head>

<body>

<div class="wrapper">

    <div class="header">
        <div class="header-title">OBJECT DETECTION</div>
        <div class="header-sub">Camera → Objects → Auto Voice → Chatbot</div>
        <div style="margin-top:16px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
            <span style="padding:6px 14px;background:rgba(255,255,255,0.1);backdrop-filter:blur(10px);border-radius:999px;font-size:12px;font-weight:600;border:1px solid rgba(255,255,255,0.2);">⚡ FPGA Accelerated</span>
            <span style="padding:6px 14px;background:rgba(255,255,255,0.1);backdrop-filter:blur(10px);border-radius:999px;font-size:12px;font-weight:600;border:1px solid rgba(255,255,255,0.2);">🎯 YOLO Detection</span>
            <span style="padding:6px 14px;background:rgba(255,255,255,0.1);backdrop-filter:blur(10px);border-radius:999px;font-size:12px;font-weight:600;border:1px solid rgba(255,255,255,0.2);">🚀 Real-time</span>
        </div>
    </div>

    <div class="card">

        <!-- LEFT CAMERA -->
        <div class="panel">
            <div class="status-tag">
                <div class="status-dot"></div> LIVE CAMERA
            </div>
            <h2>Camera View</h2>
            <div class="scan-line"></div>
            <img id="imgbox" src="" style="display:none;">
        </div>

        <!-- RIGHT DETECTION TEXT -->
        <div class="panel">
            <div class="status-tag" style="border-color:#eab308;color:#facc15;">
                <div class="status-dot" style="background:#eab308;box-shadow:0 0 8px #eab308;"></div> Detection + Voice
            </div>
            <h2>Detected Objects</h2>
            <textarea id="dettext" readonly></textarea>
        </div>

    </div>
</div>

<script>
let hasCaptured = false;
let hasSpoken = false;
let hasRedirected = false;
let pollInterval = null;
let lastStartTime = null;

window.onload = () => {
    document.getElementById("dettext").value = "";
    document.getElementById("imgbox").style.display = "none";
    
    if (!hasCaptured) {
        const now = new Date();
        lastStartTime = now.getHours().toString().padStart(2,'0') + ':' + 
                       now.getMinutes().toString().padStart(2,'0') + ':' + 
                       now.getSeconds().toString().padStart(2,'0');
        
        hasCaptured = true;
        fetch("/detect_capture")
            .then(() => {
                setTimeout(() => {
                    const imgBox = document.getElementById("imgbox");
                    imgBox.src = "/detect_result.jpg?" + Date.now();
                    imgBox.onload = () => {
                        imgBox.style.display = "block";
                    };
                    imgBox.onerror = () => {
                        imgBox.style.display = "none";
                    };
                }, 800);
            })
            .catch(err => console.log("Detect capture error:", err));
    }
};

function stopPolling() {
    if (pollInterval !== null) {
        clearInterval(pollInterval);
        pollInterval = null;
    }
}

pollInterval = setInterval(() => {
    const imgBox = document.getElementById("imgbox");
    imgBox.src = "/detect_result.jpg?" + Date.now();
    
    imgBox.onload = function() {
        if (this.src && this.src.includes("/detect_result.jpg")) {
            this.style.display = "block";
        }
    };
    imgBox.onerror = function() {
        this.style.display = "none";
    };
    
    if (imgBox.complete && imgBox.naturalWidth > 0 && imgBox.src) {
        imgBox.style.display = "block";
    }

    fetch("/det_text")
        .then(r => r.text())
        .then(text => {
            document.getElementById("dettext").value = text;
            let clean = text.trim();

            if (clean !== "" && !hasSpoken) {
                hasSpoken = true;
                
                stopPolling();

                let speech = new SpeechSynthesisUtterance(clean);
                speech.rate = 1.0;

                speech.onend = () => {
                    if (!hasRedirected) {
                        hasRedirected = true;
                        
                        if(lastStartTime){
                            const endNow = new Date();
                            const endTime = endNow.getHours().toString().padStart(2,'0') + ':' + 
                                           endNow.getMinutes().toString().padStart(2,'0') + ':' + 
                                           endNow.getSeconds().toString().padStart(2,'0');
                            
                            fetch("/log_activity", {
                                method: "POST",
                                headers: {"Content-Type": "application/json"},
                                body: JSON.stringify({
                                    module: "object_detection",
                                    start_time: lastStartTime,
                                    end_time: endTime
                                })
                            }).catch(err => console.log("Activity log error:", err));
                        }
                        
                        setTimeout(() => {
                            window.location.href = "/";
                        }, 1500);
                    }
                };

                speechSynthesis.cancel();
                speechSynthesis.speak(speech);
            }
        })
        .catch(err => {
            console.log("Detect poll error:", err);
        });
}, 1200);

window.addEventListener("beforeunload", stopPolling);
</script>

</body>
</html>
