<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>EDGE SIGHT - PARENTAL MODE</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}

html, body{
    height:100%;
    margin:0;
    padding:0;
    overflow:hidden;
}

body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:radial-gradient(circle at top left,#1e40af 0,transparent 45%),
               radial-gradient(circle at bottom right,#d946ef 0,transparent 45%),
               #020617;
    color:#e5e7eb;
    position:relative;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image:linear-gradient(#11182733 1px,transparent 1px),
                      linear-gradient(90deg,#11182733 1px,transparent 1px);
    background-size:40px 40px;
    opacity:0.4;
    z-index:0;
    pointer-events:none;
}

.main-wrapper{
    position:relative;
    z-index:1;
    height:100vh;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

.header{
    padding:15px 25px;
    text-align:center;
    border-bottom:1px solid rgba(30,64,175,0.2);
    background:rgba(15,23,42,0.4);
    backdrop-filter:blur(10px);
}

.header-title{
    font-size:28px;
    font-weight:800;
    letter-spacing:0.08em;
    color:#e5e7eb;
    margin-bottom:4px;
    background:linear-gradient(135deg,#667eea,#d946ef);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
}

.header-sub{
    font-size:11px;
    color:#9ca3af;
    letter-spacing:0.05em;
}

.content-wrapper{
    flex:1;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

.main-content{
    flex:1;
    padding:15px 25px;
    overflow-y:auto;
    overflow-x:hidden;
}

.main-content::-webkit-scrollbar{
    width:8px;
}
.main-content::-webkit-scrollbar-track{
    background:transparent;
}
.main-content::-webkit-scrollbar-thumb{
    background:rgba(102,126,234,0.3);
    border-radius:10px;
}
.main-content::-webkit-scrollbar-thumb:hover{
    background:rgba(102,126,234,0.5);
}

.main-layout{
    display:grid;
    grid-template-columns:0.6fr 1.4fr;
    gap:12px;
    margin-bottom:12px;
    height:calc(100vh - 200px);
    max-height:450px;
}

.control-card{
    display:flex;
    flex-direction:column;
    height:100%;
}

.right-stack{
    display:flex;
    flex-direction:column;
    gap:6px;
    height:100%;
}

.compact-card{
    flex:1;
    display:flex;
    flex-direction:column;
    min-height:0;
    overflow:hidden;
}

.card{
    padding:14px;
    border-radius:14px;
    background:rgba(15,23,42,0.95);
    border:1px solid rgba(102,126,234,0.3);
    box-shadow:0 8px 20px rgba(0,0,0,0.5);
    backdrop-filter:blur(10px);
}

.card h2{
    color:#a5b4fc;
    margin-bottom:10px;
    font-size:13px;
    letter-spacing:0.16em;
    font-weight:700;
    text-transform:uppercase;
}

.control-section{
    display:flex;
    flex-direction:column;
    gap:10px;
    overflow-y:auto;
}

.status-box{
    background:rgba(15,23,42,0.5);
    padding:12px;
    border-radius:12px;
    border:1px solid rgba(102,126,234,0.3);
}

.status-label{
    font-size:10px;
    color:#9ca3af;
    margin-bottom:6px;
    font-weight:600;
    text-transform:uppercase;
}

.status-text{
    font-size:11px;
    color:#cbd5e1;
    line-height:1.4;
}

.btn{
    padding:12px 14px;
    border-radius:10px;
    border:none;
    font-weight:600;
    cursor:pointer;
    font-size:11px;
    transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    text-transform:uppercase;
    letter-spacing:0.05em;
}

.btn-primary{
    background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
    color:white;
    box-shadow:0 4px 16px rgba(102,126,234,0.3);
}

.btn-primary:hover:not(:disabled){
    transform:translateY(-2px);
    box-shadow:0 8px 24px rgba(102,126,234,0.5);
}

.btn-exit{
    background:linear-gradient(135deg,#06b6d4 0%,#0891b2 100%);
    color:white;
    box-shadow:0 4px 16px rgba(6,182,212,0.3);
}

.btn-exit:hover:not(:disabled){
    transform:translateY(-2px);
    box-shadow:0 8px 24px rgba(6,182,212,0.5);
}

.summary-box{
    background:rgba(15,23,42,0.5);
    padding:12px;
    border-radius:10px;
    border:1px solid rgba(102,126,234,0.3);
    margin-bottom:6px;
    text-align:center;
}

.summary-label{
    font-size:9px;
    color:#9ca3af;
    margin-bottom:4px;
}

.summary-value{
    font-size:16px;
    color:#667eea;
    font-weight:700;
}

.module-list{
    background:rgba(15,23,42,0.5);
    padding:16px;
    border-radius:10px;
    border:1px solid rgba(102,126,234,0.3);
    overflow-y:auto;
    flex:1;
}

.module-item{
    display:flex;
    justify-content:space-between;
    padding:14px 12px;
    margin-bottom:8px;
    background:rgba(102,126,234,0.1);
    border-radius:8px;
    border-left:2px solid #667eea;
    font-size:16px;
}

.module-name{
    color:#cbd5e1;
    font-weight:600;
    font-size:15px;
}

.module-time{
    color:#667eea;
    font-weight:700;
    font-size:15px;
}

.graph-history-container{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    margin-bottom:12px;
}

.graph-section{
    margin-bottom:0;
}

.graph-card{
    grid-column:1/-1;
    display:flex;
    flex-direction:column;
    width:100%;
}

.stats-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    margin-bottom:12px;
}

.stat-box{
    background:rgba(15,23,42,0.5);
    padding:12px;
    border-radius:10px;
    border:1px solid rgba(102,126,234,0.3);
    text-align:center;
}

.stat-value{
    font-size:14px;
    color:#667eea;
    font-weight:700;
    margin-bottom:2px;
}

.stat-unit{
    font-size:8px;
    color:#9ca3af;
    text-transform:uppercase;
    font-weight:600;
}

.chart-container{
    position:relative;
    height:180px;
    margin-bottom:8px;
}

.chart-wrapper{
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
}

canvas{
    max-height:100%;
}

.activity-section{
    width:100%;
    padding:0;
    height:100%;
    display:flex;
    flex-direction:column;
}

.activity-section .card{
    margin-bottom:0;
    flex:1;
    display:flex;
    flex-direction:column;
    min-height:0;
    overflow:hidden;
}

.activity-title{
    font-size:12px;
    color:#667eea;
    font-weight:700;
    margin-bottom:8px;
    text-transform:uppercase;
    letter-spacing:0.05em;
}

.activity-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(120px, 1fr));
    gap:8px;
    overflow-y:auto;
}

.activity-item{
    background:rgba(102,126,234,0.1);
    padding:10px;
    border-radius:10px;
    border:1px solid rgba(102,126,234,0.2);
    text-align:center;
    transition:all 0.3s ease;
    cursor:pointer;
}

.activity-item:hover{
    background:rgba(102,126,234,0.2);
    border-color:rgba(102,126,234,0.4);
    transform:translateY(-2px);
}

.activity-time{
    font-size:8px;
    color:#9ca3af;
    margin-bottom:4px;
}

.activity-name{
    font-size:10px;
    color:#cbd5e1;
    font-weight:600;
    margin-bottom:2px;
}

.activity-duration{
    font-size:9px;
    color:#667eea;
    font-weight:700;
}

.empty-state{
    text-align:center;
    padding:20px;
    color:#6b7280;
}

.empty-icon{
    font-size:32px;
    margin-bottom:8px;
    opacity:0.5;
}

@media(max-width:1200px){
    .main-layout{
        grid-template-columns:1fr;
    }
    
    .right-stack{
        grid-column:1;
    }
}

@media(max-width:700px){
    .main-content{
        padding:15px;
    }
    
    .activity-grid{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<div class="main-wrapper">

    <!-- HEADER -->
    <div class="header">
        <div class="header-title">👨‍👩‍👧 PARENTAL MODE</div>
        <div class="header-sub">Daily Usage Analytics • Module Tracking • Activity Insights</div>
    </div>

    <!-- MAIN CONTENT AREA -->
    <div class="content-wrapper">
        <div class="main-content">
            
            <!-- MAIN LAYOUT: STATS (LEFT) + MODULES (RIGHT) -->
            <div class="main-layout">
                <!-- LEFT: STATS & CONTROLS -->
                <div class="card control-card">
                    <h2>📊 Summary</h2>
                    <div class="control-section">
                        <div class="summary-box">
                            <div class="summary-label">Today's Date</div>
                            <div class="summary-value" id="dateDisplay">—</div>
                        </div>
                        
                        <div class="summary-box">
                            <div class="summary-label">Total Time Used</div>
                            <div class="summary-value" id="totalTime">0m</div>
                        </div>
                        
                        <div class="summary-box">
                            <div class="summary-label">Most Used</div>
                            <div class="summary-value" id="mostUsed" style="font-size:12px;">—</div>
                        </div>
                        
                        <div class="summary-box">
                            <div class="summary-label">Modules Used</div>
                            <div class="summary-value" id="modulesCount">0</div>
                        </div>
                        
                        <div style="flex:1;"></div>
                        
                        <button class="btn btn-primary" onclick="refreshData()">
                            🔄 Refresh
                        </button>
                        
                        <button class="btn btn-exit" onclick="exitParental()">
                            ← Return To Chat
                        </button>
                    </div>
                </div>

                <!-- RIGHT: MODULE BREAKDOWN -->
                <div class="right-stack">
                    <div class="card compact-card">
                        <h2>📱 Module Usage</h2>
                        <div class="module-list" id="moduleList">
                            <div class="empty-state">
                                <div class="empty-icon">📊</div>
                                <div style="font-size:10px;">No activity yet</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- GRAPH & TIMELINE SIDE BY SIDE -->
            <div class="graph-history-container">
                <!-- USAGE CHART -->
                <div class="graph-section">
                    <div class="card graph-card">
                        <h2>📈 Usage Breakdown</h2>
                        
                        <div class="stats-row">
                            <div class="stat-box">
                                <div class="stat-value" id="activeMins">0</div>
                                <div class="stat-unit">Active Minutes</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-value" id="sessionCount">0</div>
                                <div class="stat-unit">Sessions</div>
                            </div>
                        </div>
                        
                        <div class="chart-container">
                            <div class="chart-wrapper">
                                <canvas id="usageChart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ACTIVITY TIMELINE -->
                <div class="activity-section">
                    <div class="card">
                        <div class="activity-title">⏰ Activity Timeline</div>
                        <div class="activity-grid" id="activityGrid">
                            <div class="empty-state" style="grid-column:1/-1;">
                                <div class="empty-icon">📅</div>
                                <div style="font-size:10px;">No activity today</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

</div>

<script>
let usageChart = null;
const synth = window.speechSynthesis;
const moduleEmojis = {
    'chat': '💬',
    'medical': '🏥',
    'mental': '🧠',
    'diary': '📔',
    'parental': '👨‍👩‍👧',
    'location': '📍',
    'ocr': '🔍',
    'object_detection': '📸'
};

function getModuleEmoji(module) {
    return moduleEmojis[module.toLowerCase()] || '📱';
}

function refreshData() {
    fetch("/analytics/daily_summary")
        .then(r => r.json())
        .then(data => {
            const totalMins = data.total_minutes || 0;
            const breakdown = data.module_breakdown || [];
            
            // Update summary
            document.getElementById("totalTime").textContent = totalMins + "m";
            document.getElementById("modulesCount").textContent = breakdown.length;
            document.getElementById("activeMins").textContent = Math.round(totalMins);
            document.getElementById("sessionCount").textContent = breakdown.length;
            
            // Most used module
            if(breakdown.length > 0){
                const firstModule = breakdown[0].module || "—";
                document.getElementById("mostUsed").textContent = firstModule.charAt(0).toUpperCase() + firstModule.slice(1);
            }
            
            // Module breakdown
            let html = '';
            if(breakdown.length === 0){
                html = '<div class="empty-state"><div class="empty-icon">📊</div><div style="font-size:10px;">No activity yet</div></div>';
            } else {
                breakdown.forEach(m => {
                    const moduleName = m.module || "Unknown";
                    const emoji = getModuleEmoji(moduleName);
                    const mins = m.minutes || 0;
                    html += `
                        <div class="module-item">
                            <span class="module-name">${emoji} ${moduleName}</span>
                            <span class="module-time">${mins}m</span>
                        </div>
                    `;
                });
            }
            document.getElementById("moduleList").innerHTML = html;
            
            // Update chart
            updateChart(breakdown);
        })
        .catch(err => {
            console.log("Analytics error:", err);
            document.getElementById("totalTime").textContent = "0m";
            document.getElementById("modulesCount").textContent = "0";
        });
    
    // Load activity timeline
    fetch("/analytics/module_details")
        .then(r => r.json())
        .then(details => {
            let html = '';
            const detailsArray = Array.isArray(details) ? details : [];
            
            if(detailsArray.length === 0){
                html = '<div class="empty-state" style="grid-column:1/-1;"><div class="empty-icon">📅</div><div style="font-size:10px;">No activity today</div></div>';
            } else {
                detailsArray.forEach(d => {
                    const moduleName = d.module || "Unknown";
                    const emoji = getModuleEmoji(moduleName);
                    const startTime = (d.start_time || "00:00").substring(0, 5);
                    const mins = d.duration_minutes || 0;
                    html += `
                        <div class="activity-item">
                            <div class="activity-time">${startTime}</div>
                            <div class="activity-name">${emoji} ${moduleName}</div>
                            <div class="activity-duration">${mins}m</div>
                        </div>
                    `;
                });
            }
            document.getElementById("activityGrid").innerHTML = html;
        })
        .catch(err => {
            console.log("Activity error:", err);
            document.getElementById("activityGrid").innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div class="empty-icon">📅</div><div style="font-size:10px;">No activity today</div></div>';
        });
}

function updateChart(data) {
    const labels = data.map(d => d.module.charAt(0).toUpperCase() + d.module.slice(1));
    const values = data.map(d => d.minutes);
    const colors = ['#667eea', '#d946ef', '#06b6d4', '#ec4899', '#f59e0b'];
    
    const ctx = document.getElementById("usageChart");
    if(usageChart){
        usageChart.destroy();
    }
    
    usageChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: labels,
            datasets: [{
                data: values,
                backgroundColor: colors.slice(0, data.length),
                borderColor: '#020617',
                borderWidth: 2
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    position: 'bottom',
                    labels: {
                        color: '#cbd5e1',
                        font: {size: 10, weight: '600'},
                        padding: 10,
                        usePointStyle: true
                    }
                }
            }
        }
    });
}

function exitParental(){
    synth.cancel();
    window.location.href = "/";
}

window.onload = () => {
    const today = new Date();
    const dateStr = today.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    document.getElementById("dateDisplay").textContent = dateStr;
    
    refreshData();
    
    // Refresh every 2 seconds
    setInterval(refreshData, 2000);
};
</script>

</body>
</html>
